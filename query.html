<div class="inline-drawer-content enerccio_sidequery_query_body">
    <div class="enerccio_sidequery_response"></div>

    <div class="enerccio_sidequery_controls">
        <div class="enerccio_sidequery_checkbox_group">
            <div class="enerccio_sidequery_checkbox">
                <label>Persona <input class="enerccio_sidequery_include_persona" type="checkbox"/></label>
            </div>
            <div class="enerccio_sidequery_checkbox">
                <label>Characters <input class="enerccio_sidequery_include_characters" type="checkbox"></label>
            </div>
            <div class="enerccio_sidequery_checkbox">
                <label>Worldinfo <input class="enerccio_sidequery_include_worldinfo" type="checkbox"></label>
            </div>
            <div class="enerccio_sidequery_checkbox">
                <label>Scenario <input class="enerccio_sidequery_include_scenario" type="checkbox"></label>
            </div>
            <div class="enerccio_sidequery_checkbox">
                <label>Include messages between <input class="enerccio_sidequery_include_messages" type="checkbox"></label>
                <input class="enerccio_sidequery_messages_count_from" type="number" value="5" style="width: 60px; margin-left: 5px;">
                <input class="enerccio_sidequery_messages_count_to" type="number" value="5" style="width: 60px; margin-left: 5px;">
            </div>
        </div>

        <span class="enerccio_sidequery_query_token_count">Token Count: 0</span>

        <hr>

        <label>
            Query:
            <textarea class="enerccio_sidequery_user_input" placeholder="Enter your query here" rows="4"></textarea>
        </label>

        <div class="enerccio_sidequery_button_row">
            <button class="enerccio_sidequery_undo menu_button interactable" type="button">UNDO</button>
            <button class="enerccio_sidequery_send menu_button interactable" type="button">SEND</button>
            <button class="enerccio_sidequery_generate_again menu_button interactable" type="button">GENERATE AGAIN</button>
        </div>
    </div>
</div>
