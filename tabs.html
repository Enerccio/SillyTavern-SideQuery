<div id="enerccio_sidequery_query" class="drawer-content flexGap5">
    <div id="enerccio_sidequery_query_content" name="floatingQueryHolder">
        <div class="inline-drawer">
            <div id="enerccio_sidequery_toggle" class="inline-drawer-toggle inline-drawer-header">
                <b>Side Query</b>
                <div class="inline-drawer-icon fa-solid interactable up fa-circle-chevron-up" tabindex="0" role="button"></div>
            </div>

            <div class="inline-drawer-content">
                <div class="enerccio_sidequery_tabs_header">
                    <div class="enerccio_sidequery_tabs">
                    </div>
                    <button id="enerccio_sidequery_add_tab" class="menu_button interactable" title="Add New Tab">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button id="enerccio_sidequery_info_btn" class="menu_button interactable" title="View Active Prompt Context" style="margin-left: 4px;">
                        <i class="fas fa-info-circle"></i>
                    </button>

                    <div id="enerccio_sidequery_info_popover" class="enerccio_sidequery_info_panel">
                        <div class="enerccio_sidequery_info_tabs_row">
                            <div class="enerccio_sidequery_info_tab active" data-info-tab="pre">Pre-Prompt</div>
                            <div class="enerccio_sidequery_info_tab" data-info-tab="post">Post-Prompt</div>
                        </div>
                        <div class="enerccio_sidequery_info_body">
                            <textarea id="enerccio_sidequery_info_textarea" readonly placeholder="No instructions configured in extension settings."></textarea>
                        </div>
                    </div>
                </div>

                <div id="enerccio_sidequery_tabs_tabcontent">
                </div>
            </div>

        </div>
    </div>
</div>
