<div class="enerccio_sidequery_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b data-i18n="{{title}}">{{title}}</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <div class="enerccio_sidequery_settings_content">

                <table>

                    <tr title="The connection profile to use for side query.">
                        <td><span>Connection Profile</span></td>
                        <td><select id="connection_profile" class="text_pole"></select></td>
                    </tr>

                </table>

                <div class="flex-container justifyspacebetween alignitemscenter">
                    <label for="enerccio_sidequery_first_message">Initial query</label>
                    <textarea id="enerccio_sidequery_first_message" cols="4"></textarea>
                </div>

                <div class="flex-container justifyspacebetween alignitemscenter">
                    <label for="enerccio_sidequery_beforelast_message">Instructions before user input</label>
                    <textarea id="enerccio_sidequery_beforelast_message" cols="4"></textarea>
                </div>
            </div>
        </div>
    </div>
</div>
